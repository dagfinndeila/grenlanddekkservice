<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grenland Dekkservice</title>

  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --orange: #faa319;
      --navy: #1a1814;
      --bg: #f4f1ec;
    }

    body {
      margin: 0;
      font-family: "Source Sans 3", sans-serif;
      background: var(--bg);
    }

    /* ── NAV (LYS TOPP) ── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.7rem 2.5rem;
      background: #f5f5f5;
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }

    .nav-logo img {
      height: 42px;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: rgba(26,24,20,0.75);
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.8rem;
    }

    .nav-links a:hover {
      color: var(--orange);
    }

    /* ── HERO ── */
    .hero {
      height: 100vh;
      position: relative;
      display: flex;
      align-items: flex-end;
      padding: 0 3rem 5rem;
      color: white;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(160deg, rgba(0,0,0,0.25), rgba(0,0,0,0.75)),
        url("https://raw.githubusercontent.com/dagfinndeila/grenlanddekkservice/22bb82b2efe7c9febbbc1ced1d964dbc524fba69/ChatGPT%20Image%2018.%20apr.%202026%2C%2023_06_37.png")
        center/cover no-repeat;
      z-index: -1;
    }

    .hero h1 {
      font-family: "Oswald", sans-serif;
      font-size: 5rem;
      margin: 0;
    }

    .hero h1 span {
      color: var(--orange);
    }

    .hero p {
      max-width: 500px;
      opacity: 0.85;
    }

    .btn {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.8rem 2rem;
      background: var(--orange);
      color: black;
      text-decoration: none;
      font-weight: 700;
      text-transform: uppercase;
    }

    .btn:hover {
      background: #d88a0f;
    }

    section {
      padding: 5rem 2rem;
    }
  </style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">
    <img src="https://raw.githubusercontent.com/dagfinndeila/grenlanddekkservice/ca62e4a195137a6b3a81be9ffe24ccca16b38a11/gulogo.png" alt="Logo">
  </div>

  <ul class="nav-links">
    <li><a href="#tjenester">Tjenester</a></li>
    <li><a href="#priser">Priser</a></li>
    <li><a href="#kontakt">Kontakt</a></li>
  </ul>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-bg"></div>

  <div>
    <h1>Grenland <span>Dekkservice</span></h1>
    <p>Dekk, felg og service gjort skikkelig – raskt og profesjonelt.</p>
    <a class="btn" href="#kontakt">Bestill time</a>
  </div>
</div>

<section id="tjenester">
  <h2>Tjenester</h2>
  <p>Hjulskift, omlegging, balansering og dekkhotell.</p>
</section>

<section id="priser">
  <h2>Priser</h2>
  <p>Enkle og transparente priser.</p>
</section>

<section id="kontakt">
  <h2>Kontakt</h2>
  <p>Ta kontakt for timebestilling.</p>
</section>

</body>
</html>
